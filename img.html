<!-- 

Елемент picture — це контейнер, який надає кілька джерел для елемента img, що міститься в ньому, щоб дозволити авторам декларативно контролювати або надавати підказки агенту користувача щодо того, який ресурс зображення використовувати, на основі щільності пікселів екрана, розміру області перегляду, формату зображення та інших факторів. Він представляє його дочірні елементи.

HTML-елемент <picture> містить нуль або більше елементів <source> та один елемент <img>, щоб запропонувати альтернативні версії зображення для різних сценаріїв відображення/пристрою.

Браузер розглядатиме кожен дочірній елемент <source> та вибиратиме серед них найкращий збіг. Якщо збігів не знайдено — або браузер не підтримує елемент <picture> — вибирається URL-адреса атрибута src елемента <img>. Потім вибране зображення відображається в просторі, зайнятому елементом <img>.

    
<picture>
  <source
    srcset="/images/product.jpg"
    media="(orientation: portrait)" />
  <img src="/images/product.jpg" alt="" />
</picture>
-->
                                <div class="card">
                                    <div class="card-picture">
                                        <picture class="image">
                                            <img src="images/product-6.jpg" alt="">

                                        </picture>
                                    </div>
                                    <div class="card-body">
                                        <div class="card-title">Card title</div>
                                        <span>123</span>
                                    </div>
                                </div>
                            </div>
                        </section>

                </div>
            </div>

                3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="red"></path></svg>
